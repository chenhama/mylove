  <script>
      // ページ読み込み時にLambdaを叩く
      window.onload = function() {
          const counterElement = document.getElementById('count-number');
          const pageName = "home"; // ページごとに識別したい場合はここを変える

          // 先ほどのLambda関数URLを指定（リージョン修正済みのもの）
          const lambdaUrl = "https://nmstvhbcku6y5v7umf2biyjioy0gahef.lambda-url.ap-southeast-2.on.aws/?page=" + pageName;

          fetch(lambdaUrl)
              .then(response => {
                  if (!response.ok) throw new Error('Network response was not ok');
                  return response.json();
              })
              .then(data => {
                  // Lambdaから返ってきた count を表示
                  counterElement.innerText = data.count;
              })
              .catch(error => {
                  console.error('Error:', error);
                  counterElement.innerText = "Error";
              });
      };
  </script>

  <script>
      const carousel = document.querySelector(".carousel");
      const slide = document.querySelector(".carousel-slide");
      const leftBtn = document.querySelector(".left");
      const rightBtn = document.querySelector(".right");

      const slideWidth = slide.offsetWidth / 3; // 3枚のスライドの幅
      let currentIndex = 0;

      // 左側のボタンが押された時の処理
      leftBtn.addEventListener("click", () => {
        if (currentIndex > 0) {
          currentIndex--;
          slide.style.transform = `translateX(-${currentIndex * slideWidth}px)`;
        }
      });

      // 右側のボタンが押された時の処理
      rightBtn.addEventListener("click", () => {
        if (currentIndex < 2) {
          currentIndex++;
          slide.style.transform = `translateX(-${currentIndex * slideWidth}px)`;
        }
      });
  </script>
